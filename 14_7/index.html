<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tham Gia - Hào Khí Hiệp Khách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <nav class="navbar navbar-dark bg-dark-transparent py-2">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="navbar-brand d-flex align-items-center logo-game">
                <a href="#" class="header-logo" aria-label="Hào Khí Du Hiệp" title="Hào Khí Du Hiệp"></a>
            </div>
            <div class="header-buttons d-flex align-items-center gap-3">
                <a href="#" class="text-light text-decoration-none"><i class="fa-solid fa-house"></i></a>
                <a href="#" class="text-light text-decoration-none"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="btn btn-login-header" aria-label="Đăng nhập" title="Đăng nhập"></a>
            </div>
        </div>
    </nav>

    <section class="hero-section text-center position-relative">
        <div class="hero-center-logo" aria-hidden="true"></div>
        <div class="hero-center-image" aria-hidden="true"></div>
        <div class="container py-4">
            <div class="spacer-top"></div> 
            
            <div class="menu-frame position-relative">
                <div class="menu-frame-bg"></div>
                <div class="d-flex flex-wrap justify-content-center gap-2 menu-tabs">
                    <button class="btn btn-tab btn-thele-image" aria-label="Thể lệ"></button>
                    <button class="btn btn-tab btn-hd-image" aria-label="Hướng dẫn"></button>
                    <button class="btn btn-tab active-register" aria-label="Tham gia ngay">THAM GIA NGAY</button>
                    <button class="btn btn-tab btn-taigame-image" aria-label="Tải game"></button>
                    <button class="btn btn-tab btn-napthe-image" aria-label="Nạp thẻ"></button>
                </div>
            </div>
        </div>
    </section>

    <section class="register-section pb-5">
        <div class="container">
            <div class="register-title-container text-center mb-5">
                
            </div>

            <div class="row g-4 justify-content-center align-items-stretch">
                
                <div class="col-lg-5 col-12">
                    <div class="upload-container h-100 d-flex flex-column justify-content-between p-4">
                        
                        <div class="main-upload-box text-center p-4 d-flex flex-column align-items-center justify-content-center flex-grow-1 mb-3">
                            <input type="file" id="main-photo" class="d-none" accept="image/*">
                            <label for="main-photo" class="upload-label cursor-pointer w-100 h-100"></label>
                        </div>

                        <div class="row g-2 align-items-center justify-content-center img-small-row">
                            <div class="col-4">
                                <div class="sub-upload-box text-center py-3 d-flex align-items-center justify-content-center">
                                    <input type="file" id="sub-photo-1" class="d-none" accept="image/*">
                                    <label for="sub-photo-1" class="cursor-pointer w-100 h-100"></label>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="sub-upload-box text-center py-3 d-flex align-items-center justify-content-center">
                                    <input type="file" id="sub-photo-2" class="d-none" accept="image/*">
                                    <label for="sub-photo-2" class="cursor-pointer w-100 h-100"></label>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="sub-upload-box text-center py-3 d-flex align-items-center justify-content-center">
                                    <input type="file" id="sub-photo-3" class="d-none" accept="image/*">
                                    <label for="sub-photo-3" class="cursor-pointer w-100 h-100"></label>
                                </div>
                            </div>
                        </div>
                        <div class="text-center upload-caption mt-2">
                            <span>*Bắt buộc phải đăng ký đủ 4 ảnh dự thi</span>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6 col-12">
                    <div class="form-container h-100 p-4">
                        
                        <div class="row mb-4 g-2 fs-14 header-info-game vertical-info">
                            <div class="col-12">
                                <span class="info-label">Nhân vật:</span> <strong class="info-value">Lục Trà Bạc Hà</strong>
                            </div>
                            <div class="col-12">
                                <span class="info-label">Bang hội:</span> <strong class="info-value">Lạc Viên</strong>
                            </div>
                            <div class="col-12">
                                <span class="info-label">Máy chủ:</span> <strong class="info-value">S1 - Lý Bạch</strong>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-light fs-14 mb-2">Hạng mục tham gia:</label>
                            <div class="d-flex gap-4">
                                <div class="form-check custom-radio">
                                    <input class="form-check-input" type="radio" name="contestCategory" id="categoryMiss" checked>
                                    <label class="form-check-label contest-label contest-label-miss" for="categoryMiss" aria-label="Thi Miss"></label>
                                </div>
                                <div class="form-check custom-radio">
                                    <input class="form-check-input" type="radio" name="contestCategory" id="categoryMister">
                                    <label class="form-check-label contest-label contest-label-mister" for="categoryMister" aria-label="Thi Mister"></label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3 position-relative">
                            <input type="text" class="form-control custom-input address-box-input" placeholder="Nhập địa chỉ liên hệ nhận thưởng">
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <input type="text" class="form-control custom-input phone-box-input" placeholder="Nhập số điện thoại">
                            </div>
                            <div class="col-md-6">
                                <select class="form-select custom-input area-box-input">
                                    <option value="" selected>Chọn khu vực</option>
                                    <option value="mien-bac">Miền Bắc</option>
                                    <option value="mien-trung">Miền Trung</option>
                                    <option value="mien-nam">Miền Nam</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4 cccd-section">
                            <label class="form-label text-light fs-13 mb-2">Nhập ảnh CMND/CCCD (Chụp mặt trước và mặt sau để đối chiếu thông tin khi trao giải):</label>
                            <div class="row g-2">
                                <div class="col-6">
                                    <img src="./image/mattruoc.png" alt="Mặt trước" class="cccd-image">
                                </div>
                                <div class="col-6">
                                    <img src="./image/matsau.png" alt="Mặt sau" class="cccd-image">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <textarea class="form-control custom-input intro-box" rows="3" placeholder="Nhập nội dung giới thiệu (Không quá 300 ký tự)"></textarea>
                        </div>

                        <div class="mb-4">
                            <input type="text" class="form-control custom-input video-box-input" placeholder="Nhập video dự thi (nếu có)">
                        </div>

                        <div class="d-flex justify-content-center gap-3 container-action-buttons">
                            <button type="submit" class="btn btn-action-submit text-uppercase fw-bold"></button>
                            <button type="button" class="btn btn-action-cancel text-uppercase fw-bold"></button>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
